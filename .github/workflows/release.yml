name: Release Publish (Tag)

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    if: startsWith(github.ref, 'refs/tags/v') && github.repository == 'miadco/agentshield'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: |
          python -m pip install -U pip setuptools wheel
          python -m pip install -e ".[dev]"

      - name: Ruff
        run: |
          ruff check agentshield tests

      - name: Mypy (strict)
        run: |
          mypy agentshield --strict

      - name: Bandit
        run: |
          bandit -q -r agentshield

      - name: Pytest
        run: |
          pytest -q

      - name: Build artifacts
        run: |
          python -m build --no-isolation

      - name: Twine check
        run: |
          python -m twine check dist/*

      - name: Generate checksums
        run: |
          sha256sum dist/* > dist/SHA256SUMS

      - name: Validate install smoke
        run: |
          bash scripts/validate_dist.sh dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
